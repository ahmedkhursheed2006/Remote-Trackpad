name: liquid_trackpad
description: "A professional remote trackpad for digital artists and power users."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#0F0F0F"
  image: "assets/splash.png"
  android_12:
    image: "assets/splash.png"
    color: "#0F0F0F"
  fullscreen: true

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png
    - assets/splash.png
